services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      PORT: 4000
      CLIENT_DIST_DIR: /app/client/dist
      DATABASE_PATH: /data/support.db
      UPLOAD_DIR: /data/uploads
      RECORDING_DIR: /data/recordings
      RTC_MIN_PORT: 40000
      RTC_MAX_PORT: 40100
    volumes:
      - livedesk_data:/data
    expose:
      - "4000"
    ports:
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env.deploy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  livedesk_data:
  caddy_data:
  caddy_config:
